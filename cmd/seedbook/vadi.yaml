new_sword_master:
  name: "Filippo Vadi"
  bio: "Italian fencing master from Pisa, active in the late 15th century. A student of the Fiore dei Liberi tradition, Vadi served at the court of Guidobaldo da Montefeltro, Duke of Urbino. His treatise blends the Italian school with original contributions on tempo, measure, and the primacy of the cut."
  birth_year: 1425
  death_year: 1501

sword_master: ""

book:
  title: "De Arte Gladiatoria Dimicandi"
  description: "On the Art of Swordsmanship — a comprehensive Italian fighting treatise dedicated to Duke Guidobaldo da Montefeltro of Urbino. Written in verse and prose, it covers longsword, dagger, poleaxe, spear, one-handed sword, armored combat, and grappling, building on the Fiore tradition while introducing original concepts on tempo, measure, and the superiority of the cut over the thrust."
  publication_year: 1482

chapters:
  - title: "Foundations and Principles"
    description: "The theoretical introduction to Vadi's system, covering the qualities of a good swordsman, the importance of tempo and measure, the anatomy of the sword, and the philosophical underpinnings of the art of defense."
    techniques:
      - name: "The Qualities of a Swordsman"
        description: "Vadi's seven virtues required of a fencer: audacity, speed, prudence, cunning, good eyesight, a strong constitution, and skill born from practice."
        instructions: "Cultivate each of the seven virtues through disciplined training. Be bold but not reckless, swift yet controlled. Develop keen eyesight by practicing awareness exercises. Maintain physical fitness and hone your technique through daily repetition of guards and plays."
      - name: "The Division of the Sword"
        description: "Vadi divides the blade into four parts, each with a specific martial purpose — the first two parts near the point for cutting and thrusting, the third for parrying, and the fourth near the cross for binding and close work."
        instructions: "Understand that the first quarter near the point is for thrusting and light cuts, the second quarter for powerful cuts, the third quarter near the middle for parrying and deflecting, and the fourth quarter near the cross-guard for binding, leverage, and half-sword work."
      - name: "On Tempo and Measure"
        description: "Vadi's concept of timing (tempo) and distance (measure) as the two pillars of swordsmanship. A strike must be delivered in the correct tempo at the correct measure, or it will fail."
        instructions: "Train to recognize three measures: out of distance (fuora di misura) where no attack can land, wide measure (larga misura) where a passing step is needed to strike, and close measure (stretta misura) where a simple extension can reach. Strike only when tempo and measure align — when the opponent is between actions and within reach."
      - name: "On the Superiority of the Cut"
        description: "Vadi's argument that the cut is superior to the thrust in longsword combat, as it covers more of the body, generates greater force, and is safer to deliver."
        instructions: "Prefer the cut over the thrust in longsword play. A well-delivered cut covers a wider arc of defense, damages through armor padding, and leaves you in a safer position after delivery. Reserve the thrust for half-sword and armored combat where precision targeting of gaps is necessary."

  - title: "Longsword Guards (Poste)"
    description: "The twelve guard positions of Vadi's longsword system, each a starting point for offense and defense. Several guards are shared with the Fiore tradition while others, like the Archer's Guard, are unique to Vadi."
    techniques:
      - name: "Posta di Donna Destra (Right Woman's Guard)"
        description: "A high guard with the sword resting on the right shoulder, the most natural and powerful position for delivering descending cuts."
        instructions: "Stand with your left foot forward. Rest the sword on your right shoulder with the hilt near your right ear, the blade extending behind you at a slight upward angle. Keep the true edge facing outward. From here, step forward and deliver powerful descending fendenti (vertical cuts) or tondo (horizontal cuts) to either side."
      - name: "Posta di Donna Sinestra (Left Woman's Guard)"
        description: "The mirror of Donna Destra, held on the left shoulder for attacks from the opposite side, requiring crossed arms."
        instructions: "Stand with your right foot forward and cross your arms to rest the sword on your left shoulder. The hilt is near your left ear, the blade extending behind you. From here, deliver powerful cuts from the left, or step through with the left foot to transition into right-side guards."
      - name: "Posta di Finestra (Window Guard)"
        description: "A high guard held beside the head at temple height, threatening the opponent with the point while covering the upper body."
        instructions: "Hold the sword beside your right temple with both hands, the point aimed at the opponent's face and the true edge turned slightly outward. This guard is strong for thrusting, for receiving cuts with a deflecting parry, and for transitioning into descending cuts."
      - name: "Posta Frontale (Frontal Guard)"
        description: "A high overhead guard with the sword held above the head, the point aimed skyward, providing maximum coverage against all high attacks."
        instructions: "Raise the sword directly overhead with both arms extended, the point aimed upward and the true edge forward. This guard covers against attacks from any direction above and transitions powerfully into descending cuts. It is especially effective against opponents in lower guards."
      - name: "Posta Longa (Long Guard)"
        description: "An extended guard with the sword thrust forward at shoulder height, dominating the centerline with the point."
        instructions: "Extend the sword forward with both hands at shoulder height, arms nearly fully extended, the point aimed at the opponent's face or chest. This guard threatens the centerline and is the position you naturally arrive in after completing a cut or thrust. It forces the opponent to deal with the point before advancing."
      - name: "Posta Breve (Short Guard)"
        description: "A deceptive middle guard with the sword held close to the body, concealing your true reach from the opponent."
        instructions: "Hold the sword near your right hip with the point aimed at the opponent's face, elbows tucked close to your body. This guard conceals your measure — opponents misjudge the distance and step into range. From here, deliver quick thrusts or rising cuts as they close."
      - name: "Porta di Ferro (Iron Gate)"
        description: "A low guard with the sword held near the right hip, the point angled toward the ground, protecting the lower openings and inviting high attacks."
        instructions: "Stand with your left foot forward. Hold the sword with both hands near your right hip, the point aimed down and slightly to the left. This guard protects the lower body and invites high attacks that you can counter with rising cuts (sottani) or by passing into a thrust."
      - name: "Porta di Ferro Mezana (Middle Iron Gate)"
        description: "A centered low guard with the sword point aimed down along the body's centerline, offering balanced defense to both sides."
        instructions: "Stand with your left foot forward. Hold the sword with both hands at waist height along your centerline, the point aimed down. From here you can parry attacks from either side and respond with rising cuts or thrusts. This is one of the most balanced and defensive postures."
      - name: "Coda Longa (Long Tail)"
        description: "A rear guard with the sword extended behind the body, concealing the blade entirely from the opponent's view."
        instructions: "Stand with your left foot forward and extend the sword behind your right hip with the point aimed rearward and down. The opponent cannot see your blade and must guess your intentions. From here, deliver powerful rising or sweeping cuts as the opponent closes distance, or step through into a high guard."
      - name: "Posta Sagittaria (Archer's Guard)"
        description: "A guard unique to Vadi, resembling an archer drawing a bow, with the arms stretched wide and the sword held horizontally behind the body to deliver powerful round cuts."
        instructions: "Stand with your left foot forward. Extend your left hand forward as if pointing at the opponent while the right hand draws the sword back behind your right hip, the blade nearly horizontal. The posture resembles drawing a bow. From here, unleash a devastatingly powerful tondo (round cut) by whipping the blade forward with full body rotation."
      - name: "Posta di Corona (Crown Guard)"
        description: "A guard with the sword held above and forward of the head, forming a protective crown, especially useful against descending attacks."
        instructions: "Raise the sword above your head with both hands, the blade angled slightly forward and the point aimed upward and toward the opponent. This forms a protective roof against descending cuts. From the bind, push the opponent's blade aside and counter with a thrust or descending cut."
      - name: "Posta di Falcon (Falcon's Guard)"
        description: "A high guard similar to Window but held more forward and aggressively, the sword poised like a falcon about to strike."
        instructions: "Hold the sword high and forward near the right side of your head, with the point angled slightly down toward the opponent. Unlike Finestra, the arms are more extended and the stance more aggressive. From here, deliver fast descending cuts or thrust directly at the opponent's face."

  - title: "Longsword Plays (Zogho)"
    description: "The practical exchanges and techniques of Vadi's longsword system, covering cuts, thrusts, counters, disarms, and the transitions between wide and close play."
    techniques:
      - name: "Fendente Dritto (Right Descending Cut)"
        description: "A powerful vertical or diagonal descending cut delivered from the right side, the most fundamental offensive action in Vadi's system."
        instructions: "From Posta di Donna Destra, step forward with the right foot and deliver a powerful descending cut along a diagonal line from your upper right to the opponent's lower left. Drive the cut with hip rotation, letting the sword's weight carry through the target. End in Porta di Ferro or Posta Longa."
      - name: "Fendente Sinistro (Left Descending Cut)"
        description: "A descending cut from the left side, delivered from Donna Sinestra or as a continuation from a previous action."
        instructions: "From Posta di Donna Sinestra, step forward with the left foot and deliver a powerful descending cut along a diagonal from your upper left to the opponent's lower right. This cut is mechanically stronger when combined with a passing step, using the full rotation of the body."
      - name: "Sottano Dritto (Right Rising Cut)"
        description: "A rising cut delivered from below on the right side, targeting the opponent's arms, body, or face from a low guard."
        instructions: "From Porta di Ferro, step forward with the left foot and deliver a rising cut from your lower right to the opponent's upper left. Rotate the hips upward to drive the cut. This attack is especially effective against opponents in high guards, as it strikes underneath their defense."
      - name: "Mezzano Dritto (Right Middle Cut)"
        description: "A horizontal cut delivered from the right at the level of the opponent's waist or arms, also called a tondo."
        instructions: "From any right-side guard, step offline to the left and deliver a horizontal cut from right to left at the opponent's midsection. Rotate the entire body to drive the cut, keeping the arms extended. This cut is effective at wide measure and covers a large defensive arc."
      - name: "Colpo di Villano (Peasant's Strike)"
        description: "A raw, powerful rising cut from below that Vadi acknowledges as dangerous despite its lack of sophistication."
        instructions: "From a low guard, deliver a powerful rising cut from your right side straight upward, using full hip and shoulder rotation. While lacking the finesse of other techniques, this strike generates tremendous force and is difficult to stop once in motion. Vadi warns that even a master must respect this cut."
      - name: "Rompere di Punta (Breaking the Thrust)"
        description: "A defensive technique that beats aside an incoming thrust and follows with an immediate counter-attack."
        instructions: "As the opponent thrusts, step to the side and beat their blade down with a sharp descending parry using the third part of your sword. As their point drops, immediately follow with a rising cut to their arms or a direct thrust to the face. The parry must be firm and sharp to force their point off line."
      - name: "Scambiar di Punta (Exchange of Thrust)"
        description: "A counter-thrust that simultaneously deflects the opponent's attack while landing your own thrust to a new opening."
        instructions: "As the opponent thrusts, beat their blade aside with the strong of your sword while stepping offline. In the same continuous motion, redirect your point into their exposed opening — typically the face or chest. This is one action, not two: the deflection and counter-thrust happen together."
      - name: "Entrare in Stretto (Entering Close Play)"
        description: "The method of transitioning from wide measure into close-quarter combat where grappling and short-weapon techniques apply."
        instructions: "After binding blades at wide measure, step forward aggressively with a passing step while maintaining blade contact. Slide your left hand up to grip the opponent's blade or wrist, controlling their weapon. From here, apply locks, disarms, pommel strikes, or throws from the wrestling section."
      - name: "Ligadura Soprana (Upper Lock from Sword)"
        description: "An arm lock applied at close measure after binding swords, levering the opponent's arm upward to force submission."
        instructions: "After entering close play and gripping the opponent's sword arm, thread your left arm under their elbow and lever their forearm upward. Press down on their upper arm with your right hand while maintaining control of your sword against their body. Step behind them to amplify the leverage."
      - name: "Presa di Spada (Sword Taking)"
        description: "A disarm executed at close measure by seizing the opponent's blade and wrenching it from their grip."
        instructions: "At the half-sword bind, pass your left hand to grip the opponent's blade near their hands. Step to the outside with your right foot to create an angle, then twist the blade sharply against their thumbs while pulling toward you. The combined rotation and pull overcomes their grip strength and strips the weapon."
      - name: "Pommel Strike (Colpo di Pomo)"
        description: "A close-range strike using the pommel of the sword to the opponent's face or head, stunning them for a follow-up."
        instructions: "In close play, release your left hand from the grip and rotate the sword so the pommel swings upward into the opponent's face or temple. The concentrated mass of the pommel delivers a stunning blow even through a padded helmet. Immediately follow with a thrust, cut, or grapple while they are dazed."

  - title: "Sword in Armor (Spada in Arme)"
    description: "Vadi's techniques for armored combat using the half-sword grip, targeting the gaps and weak points in plate armor with precise thrusts and leveraged techniques."
    techniques:
      - name: "Half-Sword Guard (Mezza Spada)"
        description: "The fundamental armored combat stance with one hand on the grip and one on the blade, optimizing for precision thrusting into armor gaps."
        instructions: "Grip the sword normally with your right hand on the handle. Place your left hand firmly on the middle of the blade with a gloved or gauntleted grip. Point the sword at the opponent's visor or armpit. This grip sacrifices cutting power for absolute precision in directing the point into narrow gaps in plate armor."
      - name: "Thrust to the Visor (Punta al Volto)"
        description: "A precise half-sword thrust aimed at the opponent's visor slit, the most accessible weak point in a closed helmet."
        instructions: "From the half-sword guard, step forward with your lead foot and drive the point at the opponent's visor slit. Use your blade hand to guide the point with surgical precision while the grip hand provides the driving force. Aim slightly upward to catch the slit as helmets are angled to deflect blows."
      - name: "Thrust to the Armpit (Punta alla Ascella)"
        description: "A half-sword thrust targeting the armpit gap where the arm meets the torso, one of the largest unarmored areas on a fully equipped knight."
        instructions: "When the opponent raises their arm to strike, step to the inside and drive the point upward into the exposed armpit. Guide the blade with your left hand to navigate past the edge of the breastplate. The thrust must be delivered before the arm descends, so timing with the opponent's action is critical."
      - name: "Thrust to the Groin (Punta al Sotto)"
        description: "A low half-sword thrust targeting the gap between the tasset plates and the leg armor, or through the mail skirt."
        instructions: "Drop your stance low and aim the half-sword thrust upward at the gap between the opponent's hip armor and thigh protection. This target is available when the opponent steps forward, momentarily opening the gap. Step offline to avoid their weapon while delivering the thrust."
      - name: "Armored Disarm (Tor di Spada in Arme)"
        description: "A technique for stripping the sword from a gauntleted opponent by levering against the restricted grip of armored hands."
        instructions: "After binding at the half-sword, hook your blade behind or over the opponent's hands and twist sharply. Gauntleted hands have reduced grip strength and flexibility, making disarms more effective in armor. Step to the outside while twisting to maximize leverage against their thumbs."
      - name: "Pommel Strike in Armor (Colpo di Pomo in Arme)"
        description: "A devastating pommel strike to the helmet at close range, using the pommel's mass to transmit concussive force through the helmet."
        instructions: "In close armored combat, invert the sword and swing the pommel into the opponent's visor or temple. The heavy pommel concentrates force into a small area, transmitting shock through even the best helmet. Follow immediately with a thrust to a gap while the opponent is stunned."

  - title: "Dagger (Daga)"
    description: "Vadi's system of dagger combat covering defenses against common attacks, disarms, locks, and counters. The dagger section focuses on empty-hand defenses against an armed opponent."
    techniques:
      - name: "First Remedy of Dagger (Overhead Defense)"
        description: "Defense against an overhead dagger strike, the most common assassination attack, using a cross-arm block to intercept the descending arm."
        instructions: "As the attacker raises the dagger for an overhead strike, step forward with your left foot and raise both arms to intercept their forearm with crossed wrists above your head. Immediately grip their wrist with your left hand and strike their elbow with your right hand to break the grip."
      - name: "Second Remedy of Dagger (Forehand Defense)"
        description: "Defense against a forehand dagger thrust coming from the attacker's right side, intercepting the arm from the outside."
        instructions: "As the attacker thrusts from their right side, step to the left with your left foot and intercept their wrist from the outside with your left hand. Pass your right hand over their arm to grip the dagger hand, then twist against the thumb to strip the weapon."
      - name: "Third Remedy of Dagger (Backhand Defense)"
        description: "Defense against a backhand dagger attack, intercepting the arm from the inside line."
        instructions: "Against a backhand slash or thrust, step to the right with your right foot and catch the attacker's forearm from the inside with your right hand. Wrap your left arm around their elbow joint and apply downward pressure to lock the arm and control the weapon."
      - name: "Ligadura di Daga (Dagger Lock)"
        description: "An arm lock applied after intercepting a dagger attack, using leverage against the elbow to force the attacker to the ground."
        instructions: "After catching the attacker's weapon arm, thread your arm under their elbow and lever their forearm upward while pressing their upper arm down. Step behind them and use your body weight to drive the lock, forcing them to their knees and compelling them to release the dagger."
      - name: "Tor di Daga (Dagger Disarm)"
        description: "A twisting disarm that strips the dagger from the attacker's grip by rotating the blade against the thumb."
        instructions: "After intercepting the weapon hand, grip the dagger blade with your left hand and the attacker's wrist with your right. Rotate the blade sharply against their thumb while pulling the weapon toward you. The combined twist and pull overcomes the strongest grip."
      - name: "Counter-Dagger Thrust (Punta di Daga)"
        description: "After disarming the attacker, using their own dagger to deliver a finishing thrust."
        instructions: "Once you have stripped the dagger from the attacker, immediately reverse your grip on the weapon and drive the point into the attacker's exposed body. Vadi emphasizes that the disarm and counter-thrust should be one fluid motion — do not pause between taking the weapon and using it."

  - title: "Poleaxe (Azza)"
    description: "Vadi's techniques for combat with the poleaxe, a favored weapon for armored judicial duels. The section covers guards, strikes, thrusts, and takedowns specific to this versatile weapon."
    techniques:
      - name: "Posta di Donna with Azza"
        description: "The Woman's Guard adapted for the poleaxe, held high on the right shoulder for powerful descending strikes with the axe head."
        instructions: "Hold the poleaxe with your right hand near the head and left hand near the butt, resting the shaft on your right shoulder. From here, deliver powerful descending strikes with the axe head, the hammer face on the back, or thrust with the top spike. The passing step amplifies all strikes."
      - name: "Porta di Ferro with Azza"
        description: "The Iron Gate guard adapted for the poleaxe, held low and to the right, the head pointing toward the ground."
        instructions: "Hold the poleaxe low on your right side with the head angled toward the ground and forward. This guard invites high attacks and allows powerful rising strikes with the butt spike or sweeping blows with the head. Step offline as the opponent commits high and strike to their exposed lower body."
      - name: "Posta di Vera Croce with Azza (True Cross)"
        description: "A centered guard unique to poleaxe combat with the weapon held horizontally across the body at chest height."
        instructions: "Hold the poleaxe horizontally at chest height with both hands spread wide, the head to your right and the butt to your left. This guard blocks attacks from either side and is the ideal position for hooks, trips, short thrusts with the spike, and binding the opponent's weapon."
      - name: "Thrust with Top Spike (Punta di Azza)"
        description: "A direct thrust with the top spike of the poleaxe targeting gaps in the opponent's armor."
        instructions: "From any guard, extend the poleaxe forward and drive the top spike at the opponent's visor, throat, or armpit. Slide your rear hand up the shaft to maximize reach, stepping forward with a lunge. The spike can penetrate mail and find gaps between plates."
      - name: "Hook and Trip (Gancio e Caduta)"
        description: "A takedown using the poleaxe head to hook the opponent's neck or leg and pull them off balance."
        instructions: "After binding poleaxes, slide your weapon head past the opponent's neck or behind their lead leg. Pull sharply back toward you while stepping to the side, using the hook of the axe head to drag them off balance and to the ground. Follow with a thrust to a gap while they are down."
      - name: "Butt Spike Strike (Colpo di Calcio)"
        description: "A strike with the butt spike of the poleaxe, used at close range or as a surprise attack following a parry."
        instructions: "After parrying an incoming blow with the middle of the shaft, slide your hands to reverse the weapon and thrust the butt spike into the opponent's visor or throat. The butt spike attack is unexpected because opponents focus on the axe head, making it an excellent counter-attack at close range."

  - title: "Spear (Lancia)"
    description: "Vadi's spear combat on foot, covering guards, thrusts, exchanges, and methods to close distance against a spear-armed opponent."
    techniques:
      - name: "Porta di Ferro with Spear"
        description: "The Iron Gate guard adapted for the spear, held low to protect the lower line and invite high attacks."
        instructions: "Hold the spear low on your right side with the point angled downward and forward. Your right hand grips near the middle of the shaft and your left hand near the butt. Step forward with rising thrusts to counter high attacks, using the spear's length to strike before the opponent can reach you."
      - name: "Posta di Finestra with Spear"
        description: "The Window Guard adapted for the spear, with the point held high and threatening the opponent's face."
        instructions: "Hold the spear beside your head with the point aimed at the opponent's face. Your right hand grips forward near the balance point and your left hand at the butt. From here, deliver direct thrusts or beat aside incoming spear points with lateral motions of the shaft."
      - name: "Posta di Donna with Spear"
        description: "The Woman's Guard adapted for the spear, held high on the shoulder for powerful overhand thrusts."
        instructions: "Rest the spear shaft on your right shoulder with your right hand near the middle and left hand at the butt. Step forward and launch the spear point in a powerful overhand thrust, using the shoulder as a fulcrum. This is the most powerful spear thrust and can be aimed at the face or chest."
      - name: "Exchange of Thrust with Spear (Scambiar di Punta)"
        description: "A counter-thrust that deflects the opponent's spear while simultaneously thrusting to a new line."
        instructions: "As the opponent thrusts, beat their spear point aside with a lateral motion of your shaft while stepping offline. In the same motion, redirect your own point into the opening created by their committed thrust. The timing must be precise — too early and they recover, too late and you are struck."
      - name: "Closing Against the Spear (Entrare Contra Lancia)"
        description: "The technique of getting inside the spear's effective range to engage at close quarters with shorter weapons or grappling."
        instructions: "As the opponent thrusts, beat their point aside and immediately rush forward along the shaft, gripping it with your lead hand to prevent a second thrust. Close to grappling range where the spear becomes a liability. Use dagger or wrestling techniques once inside their reach."

  - title: "Grappling (Abrazare)"
    description: "Vadi's wrestling techniques that underpin the entire system, including throws, locks, and takedowns that are applied when weapons bind at close range or in unarmed situations."
    techniques:
      - name: "First Remedy of Grappling"
        description: "The fundamental defensive position against a grappling attack, establishing control of the opponent's arms before they can secure a grip."
        instructions: "As the opponent reaches to grab you, step offline with your left foot and seize their right arm at the elbow with your left hand. Push their face or chin with your right hand to off-balance them rearward. From this position of advantage, transition into locks or throws."
      - name: "Upper Lock (Ligadura Soprana)"
        description: "An arm lock that forces the opponent's arm upward behind their back, compelling submission through pain."
        instructions: "From a grip on the opponent's right arm, thread your right arm under their elbow and lever their forearm upward while pressing down on their upper arm with your left hand. Step behind them and use your chest against their shoulder to amplify the lock. They must submit or risk a dislocated shoulder."
      - name: "Hip Throw (Volta di Fianco)"
        description: "A powerful hip throw that uses the rotation of the hips to send the opponent over and to the ground."
        instructions: "From a clinch, step your right foot across in front of the opponent and drop your hips below theirs. Pull them onto your hip with your arms while rotating sharply to the left. The combination of the pull and hip rotation launches them over your body to the ground. Follow them down to maintain control."
      - name: "Leg Hook Takedown (Gancio di Gamba)"
        description: "A takedown that uses the leg to hook the opponent's knee or ankle while pushing them backward."
        instructions: "From a clinch or collar grip, step your right leg behind the opponent's lead leg, hooking their ankle or calf. Push them sharply backward with your arms and body weight while your hooked leg prevents them from stepping back to recover balance. They fall rearward over your leg."
      - name: "Lower Lock (Ligadura Sottana)"
        description: "A lower arm lock that takes the opponent to the ground by twisting their arm downward and outward."
        instructions: "Seize the opponent's right wrist with both hands and step back with your right foot. Twist their arm downward and outward, rotating against the natural bend of the elbow. The pain and leverage force them face-down to the ground where you can hold them in submission."
      - name: "Collar Throw (Presa di Collare)"
        description: "A throw using a grip on the opponent's collar or the back of their neck to pull them forward and down."
        instructions: "Grip the opponent's collar or the back of their neck with your left hand. Step to the side and pull them sharply forward and downward while placing your right arm across their chest or under their arm as a fulcrum. The pull combined with the body block sends them tumbling forward to the ground."
