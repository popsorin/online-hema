# Fior di Battaglia (The Flower of Battle) by Fiore dei Liberi
# Based on the Getty MS (Ludwig XV 13) and Pisani-Dossi editions, c. 1409
#
# Usage: go run cmd/seedbook/main.go [--dry-run] templates/fior_di_battaglia.yaml

sword_master: "Fiore dei Liberi"

book:
  title: "Fior di Battaglia"
  description: "The Flower of Battle - a comprehensive medieval combat manual covering armed and unarmed combat"
  publication_year: 1409

chapters:
  - title: "Abrazare (Wrestling)"
    description: "Unarmed combat and grappling techniques forming the foundation of Fiore's system"
    techniques:
      - name: "First Remedy Master of Abrazare"
        description: "The foundational wrestling master position, establishing the defense against grappling attacks"
        instructions: "As the opponent reaches to grab you, step offline with your left foot and seize their right arm at the elbow with your left hand while pushing their chin or face with your right hand"
      - name: "Ligadura Soprana (Upper Lock)"
        description: "An arm lock that forces the opponent's arm upward, controlling them through pain compliance"
        instructions: "From a grip on the opponent's right arm, thread your right arm under their elbow and lever their forearm upward while pressing down on their upper arm with your left hand"
      - name: "Ligadura Mezana (Middle Lock)"
        description: "A mid-level arm lock that controls the opponent by bending their arm across your body"
        instructions: "Capture the opponent's right wrist with your left hand and pass your right arm over their arm at the elbow, pressing down to lock the joint while turning your body to the left"
      - name: "Ligadura Sottana (Lower Lock)"
        description: "A lower arm lock that takes the opponent to the ground by twisting their arm downward"
        instructions: "Seize the opponent's right wrist with both hands, step back with your right foot and twist their arm downward and outward, forcing them to the ground"
      - name: "Presa di Petto (Chest Grip)"
        description: "A wrestling grip targeting the opponent's chest to set up throws"
        instructions: "Close distance and grip the opponent's clothing or armor at the chest with both hands, pulling them toward you while stepping to the side to off-balance them for a throw"
      - name: "Volta Stabile (Stable Turn)"
        description: "A turning throw executed from a stable base, using the opponent's momentum against them"
        instructions: "From a clinch, pivot on your front foot and turn your hips sharply, using the rotation to throw the opponent over your hip while maintaining a low, stable stance"

  - title: "Dagger (Daga)"
    description: "Fighting with and against the dagger at close range, including defenses against common attacks"
    techniques:
      - name: "First Remedy Master of Dagger"
        description: "Defense against a forehand dagger thrust, the most common attack"
        instructions: "As the attacker thrusts with a forehand grip, step offline to the left with your left foot and intercept their wrist with your left hand, crossing your right hand over to grab their blade hand and strip the weapon"
      - name: "Second Remedy Master of Dagger"
        description: "Defense against a backhand dagger attack, intercepting the arm from the outside"
        instructions: "Against a backhand slash, step to the right with your right foot and catch the attacker's forearm from the outside with your right hand, then wrap your left arm around their elbow to control the weapon arm"
      - name: "Third Remedy Master of Dagger"
        description: "Defense against an overhand dagger strike coming from above"
        instructions: "As the attacker strikes downward, raise both arms to intercept their forearm with crossed wrists above your head, then immediately counter-grip their wrist and step in to apply a lock or disarm"
      - name: "Fourth Remedy Master of Dagger"
        description: "Defense against a reverse-grip dagger attack using leverage against the thumb"
        instructions: "Intercept the attacker's weapon arm at the wrist with both hands and twist sharply against their thumb, breaking their grip while stepping offline to control the angle"
      - name: "Fifth Remedy Master of Dagger"
        description: "A universal defense adaptable to multiple angles of dagger attack"
        instructions: "Adopt a low stance with arms forward. Regardless of the attack angle, step diagonally forward and use the near hand to parry while the far hand strikes the attacker's face or throat, then transition to a disarm"
      - name: "Tor di Daga (Dagger Disarm)"
        description: "A twisting disarm that strips the dagger from the opponent's grip"
        instructions: "After intercepting the attacker's weapon hand, grip the dagger blade with your left hand (protected by gloves) and the attacker's wrist with your right, then rotate the blade sharply against their thumb to wrench it free"
      - name: "Mezana Porta di Ferro con Daga (Middle Iron Gate with Dagger)"
        description: "A defensive guard position with the dagger held low, inviting attack while preparing a counter"
        instructions: "Hold the dagger in a reverse grip at your right hip with the point aimed downward and slightly forward. Keep your left hand raised and ready to intercept. This guard invites a high attack that you can counter from below"

  - title: "Sword in One Hand (Spada a un mano)"
    description: "Techniques for wielding the sword in a single hand without a shield"
    techniques:
      - name: "First Remedy Master of Sword in One Hand"
        description: "The foundational defense when wielding the sword in a single hand without a buckler"
        instructions: "Hold the sword extended in your right hand with the point threatening the opponent's face. As they attack, step offline and parry with a yielding motion, then riposte with a thrust to the exposed target"
      - name: "Posta di Donna (Sword in One Hand)"
        description: "The Woman's Guard adapted for single-handed sword, held high on the right shoulder"
        instructions: "Hold the sword in your right hand with the hilt beside your right ear and the blade angled back over your shoulder. Step forward with a powerful descending cut that uses the full extension of the arm"
      - name: "Ligadura Mezana (Sword in One Hand)"
        description: "A middle lock applied after binding swords in single-hand play, transitioning from swordplay to grappling"
        instructions: "After your blades bind in the middle, pass your left hand to grip the opponent's sword wrist, release your own sword to hang from the wrist strap, and apply the middle lock with your free hand against their elbow"
      - name: "Colpo di Villano (Peasant's Strike - One Hand)"
        description: "A powerful rising cut from below, named for its raw simplicity and force"
        instructions: "From a low guard with the sword pointing down, deliver a powerful rising cut from your right side upward to the opponent's left temple, using the rotation of your hips to generate force despite the single-handed grip"

  - title: "Longsword (Spada a due mani)"
    description: "The art of the two-handed sword, the largest and most detailed section of the treatise"
    techniques:
      - name: "Tutta Porta di Ferro (Full Iron Gate)"
        description: "A low guard with the sword held near the right hip, point angled toward the ground and slightly forward"
        instructions: "Stand with your left foot forward. Hold the sword with both hands near your right hip, the point aimed down and to the left. This guard protects the lower openings and invites high attacks that you can counter with rising cuts or thrusts"
      - name: "Posta di Donna (Woman's Guard)"
        description: "A high guard with the sword resting on or near the right shoulder, one of Fiore's most versatile positions"
        instructions: "Stand with your left foot forward. Rest the sword on your right shoulder with the hilt near your ear and the blade extending behind you. From here you can deliver powerful descending cuts to either side or thrust directly forward"
      - name: "Posta di Donna la Sinestra (Left Woman's Guard)"
        description: "The mirror image of Posta di Donna, held on the left shoulder for attacks from the opposite side"
        instructions: "Stand with your right foot forward. Cross your arms and rest the sword on your left shoulder. From here, deliver powerful cuts from the left side or transition into other guards by stepping through"
      - name: "Posta di Finestra (Window Guard)"
        description: "A high guard with the sword held beside the head, the hilt at temple height and the point threatening the opponent's face"
        instructions: "Hold the sword beside your right temple with the point aimed at the opponent's face and the true edge turned slightly outward. This guard allows thrusts, cuts from above, and strong parries against incoming attacks"
      - name: "Posta Frontale (Frontal Guard)"
        description: "A high guard with the sword held overhead, point aimed upward, covering the head"
        instructions: "Raise the sword directly above your head with the arms extended, point skyward and the true edge forward. This guard defends against all high attacks and can transition into powerful descending cuts in any direction"
      - name: "Posta Longa (Long Guard)"
        description: "An extended guard with the sword thrust forward at shoulder height, threatening the opponent with the point"
        instructions: "Extend the sword forward with both hands at shoulder height, arms nearly straight, point aimed at the opponent's face or chest. This guard dominates the centerline and forces the opponent to deal with the point before closing distance"
      - name: "Posta Breve (Short Guard)"
        description: "A compact middle guard with the sword held close to the body, point aimed at the opponent"
        instructions: "Hold the sword near your right hip with the point aimed at the opponent's face, elbows close to your body. This deceptive guard conceals your reach and allows quick thrusts or parry-ripostes"
      - name: "Porta di Ferro Mezana (Middle Iron Gate)"
        description: "A centered low guard with the sword point aimed down along the centerline of the body"
        instructions: "Stand with your left foot forward and hold the sword with both hands at waist height, the point aimed down along your centerline. From here you can parry attacks to either side and respond with rising cuts or thrusts"
      - name: "Dente di Zenghiaro (Boar's Tusk)"
        description: "A low guard with the sword point aimed upward from below, like a boar's tusk ready to gore"
        instructions: "Hold the sword low on your right side with the point rising upward at roughly 45 degrees, true edge up. This guard specializes in powerful rising thrusts and can deflect incoming cuts upward"
      - name: "Posta di Bicorno (Two-Horned Guard)"
        description: "A guard with the sword held near the forehead, point aimed at the opponent's face, hands high"
        instructions: "Hold the sword at forehead height with the point directed at the opponent's face and the pommel close to your left temple. This guard threatens with the point and is strong for entering with thrusts against high attacks"
      - name: "Coda Longa (Long Tail)"
        description: "A rear guard with the sword extended behind the body, concealing the blade from the opponent's view"
        instructions: "Stand with your left foot forward and extend the sword behind your right hip with the point aimed rearward and down. This guard conceals your intentions and allows powerful rising or sweeping cuts as the opponent closes"
      - name: "Posta di Centrocruce (Central Cross Guard)"
        description: "A middle guard with the sword crossed at the center of the body, forming a defensive barrier"
        instructions: "Hold the sword horizontally at mid-chest height with the blade crossing your centerline, point to the left and the cross-guard forming a protective barrier. Use this guard to set up binds and close-quarter plays"
      - name: "First Remedy Master of Zogho Largo (Wide Play)"
        description: "The foundational master of wide-measure longsword play, covering defenses when blades meet at the middle or weak of the blade"
        instructions: "When the opponent attacks with a cut, step offline with your front foot and meet their blade with a firm parry at the middle of your sword. From the bind, immediately thrust to their face or chest before they can recover"
      - name: "Scambiar di Punta (Exchange of Thrust)"
        description: "A counter-thrust that deflects the opponent's attack while simultaneously thrusting to a new target"
        instructions: "As the opponent thrusts at you, beat their blade aside with the strong of your sword while stepping offline, and in the same motion extend your point into their exposed opening. The parry and thrust are one continuous action"
      - name: "Rompere di Punta (Breaking the Thrust)"
        description: "A defense that beats aside an incoming thrust and follows with a devastating counter-cut"
        instructions: "Against an incoming thrust, step to the side and beat the blade down with a sharp descending motion of your sword. As their point drops, immediately follow with a rising cut to their arms or a thrust to the face"
      - name: "First Master of Zogho Stretto (Close Play)"
        description: "The foundational master of close-measure play, where grappling and sword techniques merge"
        instructions: "When blades cross at close range, grip your opponent's blade or hilt with your left hand while keeping your sword threatening with your right. From here you can disarm, pommel strike, or apply locks from the wrestling section"
      - name: "Posta di Corona (Crown Guard)"
        description: "A high guard used in close play with the sword held above the head, protecting against descending attacks at the half-sword"
        instructions: "Raise the sword above your head with both hands spread wide on the grip, the blade horizontal. This creates a strong roof-block against downward attacks and lets you respond by dropping into a thrust or grapple"
      - name: "Colpo di Villano (Peasant's Strike)"
        description: "A powerful rising cut from below with both hands on the longsword, using full body rotation"
        instructions: "From a low guard, deliver a powerful rising cut from your right side upward to the opponent's left, rotating your hips and shoulders to drive the cut. This raw, committed strike is difficult to defend against due to its force"

  - title: "Sword in Armor (Spada in arme)"
    description: "Half-sword techniques and armored combat with the longsword"
    techniques:
      - name: "Mezza Spada Guard (Half-Sword Guard)"
        description: "The fundamental armored combat stance with one hand on the grip and one on the blade for precision thrusting"
        instructions: "Grip the sword normally with your right hand and place your left hand on the middle of the blade. Aim the point at gaps in the opponent's armor (visor, armpits, groin). This grip sacrifices cutting power for precise thrusting control"
      - name: "Punta al Volto (Thrust to the Visor)"
        description: "A half-sword thrust aimed directly at the opponent's visor slit, exploiting the most accessible gap in plate armor"
        instructions: "From the half-sword guard, step forward with your lead foot and drive the point straight at the opponent's visor slit. Use your blade hand to guide the point precisely while your grip hand provides the driving force"
      - name: "Colpo di Pomo (Pommel Strike)"
        description: "A strike with the pommel of the sword to stun the opponent through their helmet"
        instructions: "In close measure, release your blade hand and swing the pommel into the opponent's visor or temple. The concentrated mass of the pommel transfers shock through the helmet. Follow immediately with a thrust or grapple"
      - name: "Ligadura in Arme (Armored Lock)"
        description: "An arm lock adapted for armored combat, using the sword as a lever against the opponent's joints"
        instructions: "After binding at the half-sword, hook your blade behind the opponent's elbow or knee and use it as a lever to force the joint. Step in close and use your body weight to drive the lock, forcing them to the ground"
      - name: "Disarm in Armor"
        description: "A technique for stripping the sword from an armored opponent by leveraging against gauntleted hands"
        instructions: "At the half-sword bind, pass your blade hand to grip the opponent's blade near their hands. Twist sharply against their thumbs while pulling toward you and stepping back, wrenching the weapon from their gauntlets"

  - title: "Poleaxe (Azza)"
    description: "Combat techniques with the poleaxe, a favored weapon for armored dueling"
    techniques:
      - name: "Posta di Donna with Poleaxe"
        description: "The Woman's Guard adapted for the poleaxe, held high on the right shoulder"
        instructions: "Hold the poleaxe with your right hand near the head and left hand at the butt, resting the shaft on your right shoulder. From here, deliver powerful descending strikes with the axe head or the hammer face"
      - name: "Porta di Ferro with Poleaxe"
        description: "The Iron Gate guard adapted for the poleaxe, held low to protect the lower body"
        instructions: "Hold the poleaxe low on your right side with the head pointing toward the ground and slightly forward. This guard invites high attacks and allows powerful rising strikes with the butt spike or sweeping blows with the head"
      - name: "Posta di Finestra with Poleaxe"
        description: "The Window Guard adapted for poleaxe, with the weapon held beside the head for thrusts and strikes"
        instructions: "Hold the poleaxe beside your head with the point (top spike) aimed at the opponent's face. Your right hand grips near the head for control, left hand at the butt for power. Thrust or deliver hooking strikes from this position"
      - name: "Colpo di Punta (Poleaxe Thrust)"
        description: "A direct thrust with the top spike of the poleaxe aimed at gaps in the opponent's armor"
        instructions: "From any guard, extend the poleaxe forward and drive the top spike at the opponent's visor, throat, or armpit. Slide your rear hand up the shaft for reach and use a lunging step to close distance"
      - name: "Posta di Vera Croce (Guard of the True Cross)"
        description: "A centered guard unique to the poleaxe with the weapon held horizontally across the body"
        instructions: "Hold the poleaxe horizontally at chest height with both hands spread wide, the head to your right and the butt to your left. This guard blocks attacks from either side and sets up hooks, trips, and short thrusts"
      - name: "Hook and Trip"
        description: "A takedown using the poleaxe head to hook the opponent's leg or neck and pull them to the ground"
        instructions: "After binding poleaxes, slide your weapon head past the opponent's neck or behind their lead leg. Pull sharply back toward you while stepping to the side, using the hook of the axe head to drag them off balance and to the ground"

  - title: "Spear (Lancia)"
    description: "Fighting with the spear on foot, including guards and exchanges of thrust"
    techniques:
      - name: "Tutta Porta di Ferro with Spear"
        description: "The Full Iron Gate adapted for the spear, held low to protect the lower line and invite high attacks"
        instructions: "Hold the spear low on your right side with the point angled down and forward, your right hand near the middle and left hand at the butt. Step forward with rising thrusts to counter attacks aimed at your upper body"
      - name: "Posta di Finestra with Spear"
        description: "The Window Guard adapted for the spear, with the point held high and threatening the opponent's face"
        instructions: "Hold the spear beside your head with the point aimed at the opponent's face, right hand forward near the balance point and left hand at the butt. From here deliver direct thrusts or beat aside incoming spear points"
      - name: "Posta di Donna with Spear"
        description: "The Woman's Guard adapted for the spear, held high on the shoulder for powerful thrusts"
        instructions: "Rest the spear shaft on your right shoulder with your right hand near the middle and left hand at the butt. Step forward and launch the spear point in a powerful overhand thrust, using the shoulder as a fulcrum for force"
      - name: "Scambiar di Punta with Spear (Exchange of Thrust)"
        description: "A counter-thrust that deflects the opponent's spear while simultaneously thrusting to a new line"
        instructions: "As the opponent thrusts, beat their spear point aside with a lateral motion of your shaft while stepping offline. In the same motion, redirect your point into the opening created by their committed thrust"

  - title: "Mounted Combat (Equestrian)"
    description: "Combat on horseback with sword and lance, including mounted grappling"
    techniques:
      - name: "Mounted Sword Guard"
        description: "The primary sword guard on horseback, holding the sword high and to the right for powerful passing strikes"
        instructions: "Sit upright in the saddle with the reins in your left hand. Hold the sword in your right hand at shoulder height with the blade angled back. As horses close, deliver a powerful descending cut timed to the pass, using the horse's momentum to amplify the strike"
      - name: "Mounted Spear Charge"
        description: "The lance couched under the arm for a devastating mounted charge at full gallop"
        instructions: "Tuck the lance under your right armpit with the point aimed at the opponent's chest or shield. Grip firmly at the balance point and brace the butt against your side. Aim for the center mass and let the horse's speed deliver the impact"
      - name: "Mounted Disarm"
        description: "A technique for stripping the weapon from an opposing rider during close mounted combat"
        instructions: "As horses come alongside, release the reins and grip the opponent's weapon hand or lance shaft with your left hand. Twist sharply while pulling them toward you across the saddle, using your horse's movement to amplify the disarming force"
      - name: "Horse Wrestling (Mounted Grappling)"
        description: "Techniques for unseating an opposing rider through grappling from horseback"
        instructions: "Close to grappling range and grip the opponent's torso, arm, or helmet. Push them sideways away from their saddle while bracing yourself with your legs. Alternatively, grip under their arm and lift while your horse presses against theirs to topple the rider"
